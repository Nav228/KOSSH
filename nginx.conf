events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Gzip compression - reduces transfer size significantly
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # Upstream webapp
    upstream webapp {
        server kosh_webapp:5002;
    }

    server {
        listen 80;
        server_name _;

        # Max upload size
        client_max_body_size 100M;

        # Static files - served directly by nginx with caching
        location /static/ {
            alias /app/static/;
            expires 1h;
            add_header Cache-Control "public, max-age=3600";
            access_log off;
        }

        # Proxy to Flask webapp
        location / {
            proxy_pass http://webapp;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;

            # No caching for dynamic pages
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
            add_header Pragma "no-cache";
            add_header Expires "0";

            # Disable service worker to prevent webview errors
            add_header Service-Worker-Allowed "none";
            add_header Content-Security-Policy "worker-src 'none'";

            proxy_no_cache 1;
            proxy_cache_bypass 1;

            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }
    }
}
