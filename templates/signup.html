<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOSSH - Sign Up</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext x='50' y='65' font-size='70' font-family='Noto Sans Devanagari' text-anchor='middle' fill='%23b45309'%3E%E0%A4%95%3C/text%3E%3C/svg%3E">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Sora', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a0f2e 50%, #0f1a2e 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .bg-animation {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .grid-bg {
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(0deg, transparent 24%, rgba(255, 0, 110, 0.03) 25%, rgba(255, 0, 110, 0.03) 26%, transparent 27%, transparent 74%, rgba(255, 0, 110, 0.03) 75%, rgba(255, 0, 110, 0.03) 76%, transparent 77%, transparent),
                linear-gradient(90deg, transparent 24%, rgba(255, 0, 110, 0.03) 25%, rgba(255, 0, 110, 0.03) 26%, transparent 27%, transparent 74%, rgba(255, 0, 110, 0.03) 75%, rgba(255, 0, 110, 0.03) 76%, transparent 77%, transparent);
            background-size: 60px 60px;
            animation: slideGrid 30s linear infinite;
        }

        @keyframes slideGrid {
            0% { transform: translateY(0); }
            100% { transform: translateY(60px); }
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            border-radius: 50%;
            opacity: 0.6;
        }

        .particle-red { background: #ff006e; }
        .particle-purple { background: #8b5cf6; }
        .particle-cyan { background: #00d4ff; }

        @keyframes float-particle {
            0% { transform: translateY(0) translateX(0); opacity: 0.6; }
            50% { opacity: 0.3; }
            100% { transform: translateY(-100vh) translateX(var(--tx)); opacity: 0.6; }
        }

        .particle-red { animation: float-particle calc(15s + 5s) linear infinite; }
        .particle-purple { animation: float-particle calc(18s + 3s) linear infinite; }
        .particle-cyan { animation: float-particle calc(20s + 2s) linear infinite; }

        .signup-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            height: 100vh;
        }

        .signup-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            position: relative;
        }

        .signup-container::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 30% 50%, rgba(255, 0, 110, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 70% 30%, rgba(139, 92, 246, 0.08) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .form-wrapper {
            width: 100%;
            max-width: 480px;
            position: relative;
            z-index: 2;
            background: rgba(10, 10, 15, 0.8);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 0, 110, 0.2);
            border-radius: 24px;
            padding: 60px 50px;
        }

        .signup-header {
            margin-bottom: 40px;
            text-align: center;
        }

        .logo-section {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 24px;
            animation: fadeInDown 0.8s ease;
        }

        .logo-icon {
            font-size: 28px;
            background: linear-gradient(135deg, #ff006e, #ff3a44, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 900;
        }

        .logo-text {
            font-size: 24px;
            font-weight: 900;
            font-family: 'DM Sans', sans-serif;
            background: linear-gradient(135deg, #ff006e, #ff3a44, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 1px;
        }

        .signup-header h1 {
            font-size: 28px;
            font-weight: 700;
            color: #f8fafc;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
            animation: fadeInDown 1s ease;
        }

        .signup-header p {
            font-size: 15px;
            color: #cbd5e1;
            font-weight: 400;
            animation: fadeInDown 1.2s ease;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #e2e8f0;
            margin-bottom: 10px;
            letter-spacing: 0.2px;
        }

        .form-control,
        input.form-control {
            width: 100%;
            padding: 14px 16px 14px 48px;
            font-size: 15px;
            border: 2px solid rgba(255, 0, 110, 0.2);
            border-radius: 12px;
            background: rgba(30, 25, 40, 0.8);
            transition: all 0.3s ease;
            color: #e2e8f0 !important;
            font-weight: 500;
            -webkit-text-fill-color: #e2e8f0;
            caret-color: #ff006e;
        }

        .form-control:focus {
            outline: none;
            border-color: #ff006e;
            background: rgba(30, 25, 40, 1);
            box-shadow: 0 0 0 3px rgba(255, 0, 110, 0.1);
            color: #e2e8f0 !important;
            -webkit-text-fill-color: #e2e8f0;
        }

        .form-control::placeholder {
            color: #64748b;
        }

        /* Fix browser autofill (Chrome/Edge) showing black-on-yellow */
        input:-webkit-autofill,
        input:-webkit-autofill:hover,
        input:-webkit-autofill:focus,
        input:-webkit-autofill:active {
            -webkit-text-fill-color: #e2e8f0 !important;
            -webkit-box-shadow: 0 0 0 1000px rgba(30, 25, 40, 0.95) inset !important;
            box-shadow: 0 0 0 1000px rgba(30, 25, 40, 0.95) inset !important;
            caret-color: #ff006e !important;
            transition: background-color 5000s ease-in-out 0s;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #ff006e;
            font-size: 18px;
            pointer-events: none;
        }

        .btn-signup {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #ff006e 0%, #ff3a44 50%, #ff6b6b 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-signup:hover {
            transform: translateY(-2px);
        }

        .btn-signup:active {
            transform: translateY(0);
        }

        .login-link {
            text-align: center;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid rgba(255, 0, 110, 0.1);
        }

        .login-link p {
            font-size: 14px;
            color: #cbd5e1;
        }

        .login-link a {
            color: #ff006e;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }

        .login-link a:hover {
            color: #ff3a44;
        }

        .alert {
            padding: 14px 18px;
            border-radius: 12px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
            font-weight: 500;
            border: none;
        }

        .alert-danger {
            background: rgba(239, 68, 68, 0.15);
            color: #fca5a5;
            border-left: 4px solid #ef4444;
        }

        .alert-success {
            background: rgba(16, 185, 129, 0.15);
            color: #6ee7b7;
            border-left: 4px solid #10b981;
        }

        .home-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 0, 110, 0.1);
            border: 1px solid rgba(255, 0, 110, 0.3);
            border-radius: 12px;
            color: #ff006e;
            font-size: 18px;
            text-decoration: none;
            transition: all 0.3s ease;
            z-index: 10;
        }

        .home-btn:hover {
            background: rgba(255, 0, 110, 0.2);
            color: #ff006e;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 640px) {
            .form-wrapper {
                max-width: 100%;
                padding: 40px 24px;
            }

            .signup-header h1 {
                font-size: 24px;
            }

            .signup-header p {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <!-- ANIMATED BACKGROUND -->
    <div class="bg-animation">
        <div class="grid-bg"></div>
        <div id="particlesContainer" style="position: absolute; inset: 0; width: 100%; height: 100%;"></div>
    </div>

    <!-- SIGN UP FORM -->
    <div class="signup-wrapper">
        <a href="{{ url_for('index') }}" class="home-btn" title="Back to Home">
            <i class="bi bi-house-door-fill"></i>
        </a>
        <div class="signup-container">
            <div class="form-wrapper">
                <div class="signup-header">
                    <div class="logo-section">
                        <span class="logo-icon">क</span>
                        <span class="logo-text">KOSSH</span>
                    </div>
                    <h1>Create Account</h1>
                    <p>Join KOSSH to manage your inventory</p>
                </div>

                {% with messages = get_flashed_messages(with_categories=true) %}
                    {% if messages %}
                        {% for category, message in messages %}
                            <div class="alert alert-{{ category }}" role="alert">
                                <i class="bi bi-{{ 'check-circle-fill' if category == 'success' else 'x-circle-fill' }}"></i>
                                <span>{{ message }}</span>
                            </div>
                        {% endfor %}
                    {% endif %}
                {% endwith %}

                <form method="POST" action="{{ url_for('signup') }}" id="signupForm">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                    <div class="form-group">
                        <label for="fullname" class="form-label">Full Name</label>
                        <div class="input-wrapper">
                            <i class="bi bi-person-fill input-icon"></i>
                            <input type="text" class="form-control" id="fullname" name="fullname"
                                   placeholder="Enter your full name" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="username" class="form-label">Username</label>
                        <div class="input-wrapper">
                            <i class="bi bi-at input-icon"></i>
                            <input type="text" class="form-control" id="username" name="username"
                                   placeholder="Choose a username" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="password" class="form-label">Password</label>
                        <div class="input-wrapper">
                            <i class="bi bi-lock-fill input-icon"></i>
                            <input type="password" class="form-control" id="password" name="password"
                                   placeholder="Create a strong password" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="confirm" class="form-label">Confirm Password</label>
                        <div class="input-wrapper">
                            <i class="bi bi-lock-fill input-icon"></i>
                            <input type="password" class="form-control" id="confirm" name="confirm"
                                   placeholder="Confirm your password" required>
                        </div>
                    </div>

                    <button type="submit" class="btn-signup">
                        Create Account
                    </button>
                </form>

                <div class="login-link">
                    <p>Already have an account? <a href="{{ url_for('login') }}">Sign in</a></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        class ParticleConstellation {
            constructor() {
                this.particles = [];
                this.colors = ['#ff006e', '#8b5cf6', '#00d4ff'];
                this.container = document.getElementById('particlesContainer');
                this.init();
            }

            init() {
                const particleCount = 30;
                for (let i = 0; i < particleCount; i++) {
                    const particle = this.createParticle();
                    this.particles.push(particle);
                    this.container.appendChild(particle.el);
                }
            }

            createParticle() {
                const el = document.createElement('div');
                const color = this.colors[Math.floor(Math.random() * this.colors.length)];
                const className = color === '#ff006e' ? 'particle-red' : color === '#8b5cf6' ? 'particle-purple' : 'particle-cyan';

                el.className = `particle ${className}`;

                const startX = Math.random() * window.innerWidth;
                const startY = Math.random() * window.innerHeight;
                const duration = 15 + Math.random() * 20;
                const tx = (Math.random() - 0.5) * 200;

                el.style.left = startX + 'px';
                el.style.top = startY + 'px';
                el.style.setProperty('--duration', duration + 's');
                el.style.setProperty('--tx', tx + 'px');
                el.style.animationDelay = Math.random() * 5 + 's';

                return {
                    el: el,
                    x: startX,
                    y: startY,
                    color: color
                };
            }
        }

        new ParticleConstellation();

        // Form validation
        document.getElementById('signupForm').addEventListener('submit', function(e) {
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm').value;

            if (password !== confirm) {
                e.preventDefault();
                alert('Passwords do not match!');
                return false;
            }

            if (password.length < 6) {
                e.preventDefault();
                alert('Password must be at least 6 characters!');
                return false;
            }
        });
    </script>
</body>
</html>
