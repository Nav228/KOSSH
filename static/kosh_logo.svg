<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 80">
  <defs>
    <linearGradient id="badgeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
  </defs>
  <!-- Badge square -->
  <rect x="4" y="4" width="72" height="72" rx="16" fill="url(#badgeGrad)"/>
  <!-- KS monogram -->
  <text x="10" y="62" font-family="'Segoe UI',system-ui,-apple-system,sans-serif"
        font-size="48" font-weight="900" fill="#ffffff" letter-spacing="-4">KS</text>
  <!-- Cyan accent dot -->
  <circle cx="68" cy="16" r="6" fill="#06b6d4"/>
  <!-- KOSSH wordmark -->
  <text x="90" y="52" font-family="'Segoe UI',system-ui,-apple-system,sans-serif"
        font-size="38" font-weight="800" fill="#f8fafc" letter-spacing="-0.5">KOSSH</text>
  <!-- Tagline -->
  <text x="92" y="67" font-family="'Segoe UI',system-ui,-apple-system,sans-serif"
        font-size="9" font-weight="500" fill="#64748b" letter-spacing="4">INVENTORY SYSTEM</text>
</svg>
