<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 72">
  <defs>
    <linearGradient id="badgeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#db2777"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e879f9"/>
      <stop offset="100%" stop-color="#f0abfc"/>
    </linearGradient>
  </defs>
  <!-- Badge -->
  <rect x="2" y="3" width="66" height="66" rx="18" fill="#1a0533"/>
  <rect x="2" y="3" width="66" height="66" rx="18" fill="none" stroke="url(#badgeGrad)" stroke-width="1.5"/>
  <!-- Devanagari क -->
  <text x="10" y="57" font-family="serif" font-size="46" fill="url(#badgeGrad)">क</text>
  <!-- Wordmark -->
  <text x="84" y="46" font-family="'Segoe UI',system-ui,-apple-system,sans-serif"
        font-size="34" font-weight="800" fill="#faf5ff" letter-spacing="-0.5">KOSSH</text>
  <!-- Gradient underline -->
  <rect x="84" y="53" width="192" height="2" rx="1" fill="url(#badgeGrad)" opacity="0.6"/>
  <!-- Tagline -->
  <text x="85" y="66" font-family="'Segoe UI',system-ui,-apple-system,sans-serif"
        font-size="8.5" font-weight="400" fill="#581c87" letter-spacing="4">INVENTORY SYSTEM</text>
</svg>
