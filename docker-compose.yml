version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15
    container_name: kosh-database
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kosh}
      POSTGRES_USER: ${POSTGRES_USER:-stockpick_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stockpick_pass}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-stockpick_user} -d ${POSTGRES_DB:-kosh}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - stockpick-network

  # Flask Web Application
  web_app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kosh_webapp
    environment:
      - FLASK_ENV=${FLASK_ENV:-production}
      - FLASK_DEBUG=${FLASK_DEBUG:-False}
      - POSTGRES_HOST=kosh-database
      - POSTGRES_DB=${POSTGRES_DB:-kosh}
      - POSTGRES_USER=${POSTGRES_USER:-stockpick_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-stockpick_pass}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-stockpick_user}:${POSTGRES_PASSWORD:-stockpick_pass}@kosh-database:5432/${POSTGRES_DB:-kosh}
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - SSO_SECRET_KEY=${SSO_SECRET_KEY:-}
      - FLASK_RUN_PORT=5002
    expose:
      - "5002"
    depends_on:
      postgres:
        condition: service_healthy
    restart: always
    volumes:
      - ./logs:/app/logs
      - static_files:/app/static
    networks:
      - stockpick-network

  # Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: kosh_nginx
    ports:
      - "5002:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - static_files:/app/static:ro
    depends_on:
      - web_app
    restart: always
    networks:
      - stockpick-network

volumes:
  postgres_data:
  static_files:

networks:
  stockpick-network:
    driver: bridge